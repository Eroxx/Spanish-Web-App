      const vault = await getVault(); if (!vault) return null;
      const r = await window.cowork.callMcpTool('mcp__workspace__bash',
        { command: `cat '${vault}/${STATE_FILE}' 2>/dev/null || echo ''` });
      const text = (r.content?.[0]?.text || r.output || '').trim();
      if (!text) return null;
      const s = JSON.parse(text);
      return s?.fp === fp() ? s : null;
    } catch(e) { return null; }
  } else {
    try { const s = JSON.parse(localStorage.getItem(STATE_KEY)); return s?.fp === fp() ? s : null; } catch(e) { return null; }
  }
}

let dailyDeck, practiceDeck, mode, idx, missedWords, deck;
let revealed = false;
const deckState = { daily: { idx: 0, missed: new Set() }, practice: { idx: 0, missed: new Set() } };

document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden') saveState(); });

async function init() {
  const saved = await loadState();
  if (saved) {
    dailyDeck = saved.daily; practiceDeck = saved.practice; mode = saved.mode;
    if (saved.deckState) {
      deckState.daily.idx = saved.deckState.daily.idx || 0;
      deckState.daily.missed = new Set(saved.deckState.daily.missed || []);
      deckState.practice.idx = saved.deckState.practice.idx || 0;
      deckState.practice.missed = new Set(saved.deckState.practice.missed || []);
    } else {
      deckState[mode].idx = saved.idx || 0;
      deckState[mode].missed = new Set(saved.missed || []);
    }
    idx = deckState[mode].idx; missedWords = new Set(deckState[mode].missed);
  } else {
    dailyDeck = shuffle([...DAILY]); practiceDeck = shuffle([...PRACTICE]);
    mode = 'daily'; idx = 0; missedWords = new Set();
    deckState.daily = { idx: 0, missed: new Set() };
    deckState.practice = { idx: 0, missed: new Set() };
  }
  deck = [...(mode === 'daily' ? dailyDeck : practiceDeck)];
  revealed = false;
}

function wordCount(arr) { return new Set(arr.map(s => s.w)).size; }

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function updateTabs() {
  const d = document.getElementById('tabDaily');
  const p = document.getElementById('tabPractice');
  const dw = wordCount(DAILY);
  const pw = wordCount(PRACTICE);
  d.textContent = 'Daily · ' + dw;
  p.textContent = 'Needs Practice · ' + pw;
  d.classList.toggle('dim', mode !== 'daily');
  p.classList.toggle('dim', mode !== 'practice');
  if (PRACTICE.length === 0) p.classList.add('no-cards');
  else p.classList.remove('no-cards');
}

function setMode(m) {
  if (m === 'practice' && PRACTICE.length === 0) return;
  deckState[mode].idx = idx;
  deckState[mode].missed = new Set(missedWords);
  mode = m;
  deck = [...(mode === 'daily' ? dailyDeck : practiceDeck)];
  idx = deckState[mode].idx;
  missedWords = new Set(deckState[mode].missed);
  revealed = false;
  updateTabs();
  hideDone();
  resetFlagState();
  if (deck.length === 0) { showEmpty(); }
  else {
    hideEmpty();
    document.getElementById('cardWrap').classList.remove('hide');
    document.getElementById('keyHint').style.display = '';
    document.getElementById('actionBtns').classList.remove('show');
    render();
  }
}

function showEmpty() {
  document.getElementById('cardWrap').classList.add('hide');
  document.getElementById('keyHint').style.display = 'none';
  document.getElementById('emptyState').classList.add('show');
  document.getElementById('bar').style.width = '0%';
  document.getElementById('counter').textContent = '';
  document.getElementById('meta').textContent = '';
}
function hideEmpty() { document.getElementById('emptyState').classList.remove('show'); }
function hideDone() {
  document.getElementById('doneScreen').classList.remove('show');
  document.getElementById('flaggedSection').style.display = 'none';
}
function resetFlagState() {
  document.getElementById('flagBtn').disabled = false;
  document.getElementById('flagBtn').textContent = 'Flag for tomorrow';
  document.getElementById('flagConfirm').classList.remove('show');
}

function bold(str) { return str.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>'); }

function render() {
  const s = deck[idx];
  document.getElementById('bar').style.width = (idx / deck.length * 100).toFixed(1) + '%';
  document.getElementById('counter').textContent = (idx + 1) + ' / ' + deck.length;
  document.getElementById('meta').textContent = wordCount(deck) + ' words';
  const wl = document.getElementById('wordLabel');
  wl.textContent = s.w; wl.classList.remove('missed-flash');
  document.getElementById('spanishEl').innerHTML = bold(s.s);
  const tr = document.getElementById('translationEl');
  tr.textContent = s.e; tr.classList.remove('show');
  document.getElementById('actionBtns').classList.remove('show');
  document.getElementById('keyHint').style.opacity = '1';
  revealed = false;
}

function reveal() {
  document.getElementById('translationEl').classList.add('show');
  document.getElementById('actionBtns').classList.add('show');
  document.getElementById('keyHint').style.opacity = '1';
  revealed = true;
}

function handleAction(wasMissed) {
  if (wasMissed) {
    missedWords.add(deck[idx].w);
    deckState[mode].missed = new Set(missedWords);
    document.getElementById('wordLabel').classList.add('missed-flash');
  }
  document.getElementById('actionBtns').classList.remove('show');
  setTimeout(() => {
    idx++;
    deckState[mode].idx = idx;
    if (idx >= deck.length) { clearState(); showDone(); } else render();
  }, wasMissed ? 350 : 120);
}

function showDone() {
  document.getElementById('cardWrap').classList.add('hide');
  document.getElementById('keyHint').style.display = 'none';
  document.getElementById('doneScreen').classList.add('show');
  document.getElementById('bar').style.width = '100%';
  const wc = wordCount(deck);
  document.getElementById('doneStats').textContent = deck.length + ' sentences · ' + wc + ' words' + (missedWords.size ? ' · ' + missedWords.size + ' missed' : '');
  if (missedWords.size > 0) {
    document.getElementById('flaggedSection').style.display = 'block';
    const fw = document.getElementById('flaggedWords');
    fw.innerHTML = '';
    missedWords.forEach(w => {
      const el = document.createElement('span');
      el.className = 'flagged-word'; el.textContent = w; fw.appendChild(el);
    });
  }
}

function doRestart(doShuffle) {
  const src = mode === 'daily' ? dailyDeck : practiceDeck;
  deck = shuffle([...src]);
  idx = 0; revealed = false; missedWords = new Set();
  deckState[mode] = { idx: 0, missed: new Set() };
  clearState(); hideDone(); resetFlagState();
  document.getElementById('cardWrap').classList.remove('hide');
  document.getElementById('keyHint').style.display = '';
  document.getElementById('actionBtns').classList.remove('show');
  render();
}

function flagForTomorrow() {
  const words = [...missedWords];
  const filePath = '_06 Donkey Work/Temp Donkey Files/spanish-flagged-words.md';
  const data = words.join('\n');
  const url = 'obsidian://advanced-uri'
    + '?vault=' + encodeURIComponent('Main Brain')
    + '&filepath=' + encodeURIComponent(filePath)
    + '&data=' + encodeURIComponent(data)
    + '&mode=overwrite';
  window.open(url);
  document.getElementById('flagBtn').disabled = true;
  document.getElementById('flagBtn').textContent = 'Flagged ✓';
  setTimeout(() => document.getElementById('flagConfirm').classList.add('show'), 300);
}

document.addEventListener('click', e => {
  if (e.target.closest('button') || e.target.closest('.tab-bar')) return;
  if (document.getElementById('doneScreen').classList.contains('show')) return;
  if (document.getElementById('emptyState').classList.contains('show')) return;
  if (!revealed) reveal();
});
document.addEventListener('keydown', e => {
  if (document.getElementById('doneScreen').classList.contains('show')) return;
  if (document.getElementById('emptyState').classList.contains('show')) return;
  if (e.code === 'Space') { e.preventDefault(); if (!revealed) reveal(); else handleAction(false); }
  if (e.key === 'm' || e.key === 'M') { if (!revealed) reveal(); else handleAction(true); }
  if (e.key === 'Tab') { e.preventDefault(); setMode(mode === 'daily' ? 'practice' : 'daily'); }
});

init().then(() => { updateTabs(); if (deck.length > 0) render(); else showEmpty(); });

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/Spanish-Web-App/sw.js');
  });
}
</script>
