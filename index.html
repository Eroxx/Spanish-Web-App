</div>

<div class="meta-row" id="meta"></div>
<div class="counter" id="counter"></div>

<div class="card-wrap" id="cardWrap">

  <div class="translation" id="translationEl"></div>

    <button class="btn-action btn-missed" onclick="handleAction(true)">Missed &#10007;</button>
  </div>
</div>

<div class="empty-state" id="emptyState">
  <div class="empty-title">No cards yet</div>
  <div class="empty-body">Cards you mark Again at least twice this week will appear here.<br><br>Say &#8220;practice my sentences&#8221; with Anki open to refresh.</div>
</div>

<div class="key-hint" id="keyHint">
  <div class="k"><span>space</span> got it</div>
  <div class="k missed"><span>m</span> missed</div>
  <div class="k"><span>tab</span> switch tab</div>
</div>

<div class="done" id="doneScreen">
  <div class="done-check">&#10003;</div>
  <h2>All done</h2>
  <p class="stats" id="doneStats"></p>
  <div class="flagged-section" id="flaggedSection" style="display:none">

    <div class="flag-confirm" id="flagConfirm">Saved to vault &#8212; they&#8217;ll be first in tomorrow&#8217;s batch.</div>
  </div>
  <div class="breakdown" id="grammarBreakdown" style="display:none"></div>
  <div id="grammarSaveSection" style="display:none; margin-top:14px; text-align:center;">
    <button class="btn btn-save" id="saveBtn" onclick="saveGrammarResults()">Save results</button>
    <div class="flag-confirm" id="saveConfirm">Saved &#8212; mastery will update on next refresh.</div>
  </div>
  <div class="done-btns">
    <button class="btn btn-again" onclick="doRestart(false)">Go again</button>
    <button class="btn btn-shuffle" onclick="doRestart(true)">Shuffle</button>
  </div>
</div>

// Fingerprint uses ALL words/gids (sorted) — resistant to collisions from recurring cards
function fp() {
  const dw = [...new Set(DAILY.map(s=>s.w))].sort().join(',');
  const pw = [...new Set(PRACTICE.map(s=>s.w))].sort().join(',');
  const gw = [...new Set(GRAMMAR.map(s=>s.gid))].sort().join(',');
  return dw + '|' + pw + '|' + gw;
}
function toB64(s) { return btoa(encodeURIComponent(s).replace(/%([0-9A-F]{2})/g, (_, p) => String.fromCharCode(parseInt(p, 16)))); }
const STATE_KEY = 'spanish-state';
const STATE_FILE = '_06 Donkey Work/Temp Donkey Files/spanish-sentences-state.json';
let _vault = null;
async function getVault() {
  if (_vault !== null) return _vault;
  try {
    const r = await window.cowork.callMcpTool('mcp__workspace__bash',
      { command: 'find /sessions -maxdepth 3 -name "Main Brain" -type d 2>/dev/null | head -1' });
    _vault = (r.content?.[0]?.text || r.output || '').trim();
  } catch(e) { _vault = ''; }
  return _vault;
}
async function saveState() {
  // Sync current deck before saving
  deckState[mode].idx = idx;
  deckState[mode].missed = new Set(missedWords);
  const state = { fp: fp(), daily: dailyDeck, practice: practiceDeck, grammar: grammarDeck, mode,
    deckState: {
      daily: { idx: deckState.daily.idx, missed: [...deckState.daily.missed] },
      practice: { idx: deckState.practice.idx, missed: [...deckState.practice.missed] },

    }
  };
  if (window.cowork) {

      await window.cowork.callMcpTool('mcp__workspace__bash', { command:
        `python3 -c "import base64,os; p='${vault}/${STATE_FILE}'; os.makedirs(os.path.dirname(p),exist_ok=True); open(p,'wb').write(base64.b64decode('${b64}'))"` });
    } catch(e) {}
  } else {
    try { localStorage.setItem(STATE_KEY, JSON.stringify(state)); } catch(e) {}
  }
}

    try { const vault = await getVault(); if (vault) await window.cowork.callMcpTool('mcp__workspace__bash', { command: `rm -f '${vault}/${STATE_FILE}'` }); } catch(e) {}
  } else { try { localStorage.removeItem(STATE_KEY); } catch(e) {} }

async function loadState() {
  if (window.cowork) {
    try {
      const vault = await getVault(); if (!vault) return null;
      const r = await window.cowork.callMcpTool('mcp__workspace__bash',
        { command: `cat '${vault}/${STATE_FILE}' 2>/dev/null || echo ''` });

let dailyDeck, practiceDeck, grammarDeck, mode, idx, missedWords, deck;
let revealed = false;
// Per-deck progress: each deck remembers its own position and missed words.
// Grammar additionally tracks per-grammar-point Got/Missed counts (pointResults: {gid: {got, missed, name, mastery}}).
const deckState = {
  daily: { idx: 0, missed: new Set() },
  practice: { idx: 0, missed: new Set() },
  grammar: { idx: 0, missed: new Set(), pointResults: {} }

document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden') saveState(); });

function wordCount(arr) { return new Set(arr.map(s => s.w)).size; }
function gidCount(arr) { return new Set(arr.map(s => s.gid)).size; }

// Mastery delta band — mirrors cefr-curriculum.md +10/+7/+5 by band, -10 floor 0 / cap 100
function calcDelta(currentMastery, got, missed) {
  let m = currentMastery;
  for (let i = 0; i < missed; i++) m = Math.max(0, m - 10);
  for (let i = 0; i < got; i++) {
    if (m < 50) m += 10;
    else if (m < 80) m += 7;
    else if (m < 100) m += 5;
    m = Math.min(100, m);
  }
  return m - currentMastery;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function updateTabs() {
  const d = document.getElementById('tabDaily');
  const p = document.getElementById('tabPractice');
  const g = document.getElementById('tabGrammar');
  const dw = wordCount(DAILY);
  const pw = wordCount(PRACTICE);
  const gw = gidCount(GRAMMAR);
  d.textContent = 'Daily' + (dw > 0 ? ' · ' + dw : '');
  p.textContent = 'Needs Practice' + (pw > 0 ? ' · ' + pw : '');
  g.textContent = 'Grammar' + (gw > 0 ? ' · ' + gw : '');
  d.classList.toggle('dim', mode !== 'daily');
  p.classList.toggle('dim', mode !== 'practice');
  g.classList.toggle('dim', mode !== 'grammar');
  if (PRACTICE.length === 0) p.classList.add('no-cards'); else p.classList.remove('no-cards');
  if (GRAMMAR.length === 0) g.classList.add('no-cards'); else g.classList.remove('no-cards');
}

function setMode(m) {
  if (m === 'practice' && PRACTICE.length === 0) return;
  if (m === 'grammar' && GRAMMAR.length === 0) return;
  // Save current deck's progress before switching
  deckState[mode].idx = idx;
  deckState[mode].missed = new Set(missedWords);
  mode = m;
  deck = [...(mode === 'daily' ? dailyDeck : mode === 'practice' ? practiceDeck : grammarDeck)];
  // Restore target deck's progress
  idx = deckState[mode].idx;
  // Bug fix: if switching back to a completed deck, restart from beginning
  if (idx >= deck.length) { idx = 0; deckState[mode].idx = 0; }
  missedWords = new Set(deckState[mode].missed);
  revealed = false;
  document.body.classList.toggle('grammar-mode', mode === 'grammar');
  updateTabs();
  hideDone();
  resetFlagState();
  resetSaveState();
  if (deck.length === 0) {
    showEmpty();
  } else {
    hideEmpty();
    document.getElementById('cardWrap').classList.remove('hide');
    document.getElementById('keyHint').style.display = '';
    document.getElementById('actionBtns').classList.remove('show');
    render();
  }
}

function showEmpty() {
  document.getElementById('cardWrap').classList.add('hide');
  document.getElementById('keyHint').style.display = 'none';
  const empty = document.getElementById('emptyState');
  empty.classList.add('show');
  // Tailor empty-state copy to current mode
  const titleEl = empty.querySelector('.empty-title');
  const bodyEl = empty.querySelector('.empty-body');
  if (mode === 'grammar') {
    titleEl.textContent = 'No grammar points to drill';
    bodyEl.innerHTML = 'Activate or introduce grammar points in <code>grammar-log.md</code>.<br><br>Say &#8220;practice my sentences&#8221; to refresh after editing.';

    titleEl.textContent = 'No cards yet';
    bodyEl.innerHTML = 'Cards you mark Again at least twice this week will appear here.<br><br>Say &#8220;practice my sentences&#8221; with Anki open to refresh.';
  }
  document.getElementById('bar').style.width = '0%';
  document.getElementById('counter').textContent = '';
  document.getElementById('meta').textContent = '';
}
function hideEmpty() { document.getElementById('emptyState').classList.remove('show'); }
function hideDone() {

function bold(str) { return str.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>'); }

function render() {
  const s = deck[idx];
  if (!s) return; // safety guard — idx out of bounds
  document.getElementById('bar').style.width = (idx / deck.length * 100).toFixed(1) + '%';
  document.getElementById('counter').textContent = (idx + 1) + ' / ' + deck.length;
  const wl = document.getElementById('wordLabel');
  const infEl = document.getElementById('infinitiveEl');
  const gpl = document.getElementById('grammarPointLabel');
  wl.classList.remove('missed-flash');
  if (mode === 'grammar') {
    document.getElementById('meta').textContent = gidCount(deck) + ' points';
    gpl.textContent = s.gid + ' · ' + s.gname;
    gpl.style.display = '';
    // Pre-reveal: empty word-label (don't spoil the answer). Reveal() fills it as feedback.
    wl.textContent = '';
    infEl.textContent = '';
    // Initial display: show cloze (with blank) — sentence revealed on tap
    document.getElementById('spanishEl').innerHTML = renderCloze(s.cloze);
  } else {
    document.getElementById('meta').textContent = wordCount(deck) + ' words';
    gpl.style.display = 'none';
    wl.textContent = s.w;
    infEl.textContent = s.inf ? s.inf : '';
    document.getElementById('spanishEl').innerHTML = bold(s.s);
  }
  const tr = document.getElementById('translationEl');
  tr.textContent = s.e; tr.classList.remove('show');
  document.getElementById('actionBtns').classList.remove('show');
  document.getElementById('keyHint').style.opacity = '1';
  revealed = false;
}

// Render cloze sentence — replace the underscore blank with a styled span
function renderCloze(text) {
  return text.replace(/_{3,}/g, '<span class="cloze-blank">_____</span>');
}

function reveal() {
  // In grammar mode, swap the cloze for the bolded full sentence + show the answer in word-label
  if (mode === 'grammar') {
    const s = deck[idx];
    document.getElementById('spanishEl').innerHTML = bold(s.s);
    document.getElementById('wordLabel').textContent = s.answer;
  }
  document.getElementById('translationEl').classList.add('show');
  document.getElementById('actionBtns').classList.add('show');
  document.getElementById('keyHint').style.opacity = '1';
  revealed = true;
}

function handleAction(wasMissed) {
  const cur = deck[idx];
  if (mode === 'grammar') {
    // Per-grammar-point tracking
    const pr = deckState.grammar.pointResults;
    if (!pr[cur.gid]) pr[cur.gid] = { got: 0, missed: 0, name: cur.gname };
    if (wasMissed) {
      pr[cur.gid].missed += 1;
      missedWords.add(cur.answer);
      deckState[mode].missed = new Set(missedWords);
      document.getElementById('wordLabel').classList.add('missed-flash');
    } else {
      pr[cur.gid].got += 1;
    }
  } else {
    if (wasMissed) {
      missedWords.add(cur.w);
      deckState[mode].missed = new Set(missedWords);
      document.getElementById('wordLabel').classList.add('missed-flash');
    }
  }
  document.getElementById('actionBtns').classList.remove('show');
  setTimeout(() => {
    idx++;
    deckState[mode].idx = idx;
    if (idx >= deck.length) { clearState(); showDone(); } else { render(); saveState(); }
  }, wasMissed ? 350 : 120);
}

function showDone() {
  document.getElementById('cardWrap').classList.add('hide');
  document.getElementById('keyHint').style.display = 'none';
  document.getElementById('doneScreen').classList.add('show');
  document.getElementById('bar').style.width = '100%';
  if (mode === 'grammar') {
    const pr = deckState.grammar.pointResults;
    const total = Object.values(pr).reduce((a, x) => a + x.got + x.missed, 0);
    const totalGot = Object.values(pr).reduce((a, x) => a + x.got, 0);
    document.getElementById('doneStats').textContent = total + ' drills · ' + Object.keys(pr).length + ' points · ' + totalGot + '/' + total + ' correct';
    // Per-point breakdown — sort by total drilled descending, then by missed descending
    const bd = document.getElementById('grammarBreakdown');
    bd.innerHTML = '';
    const point = GRAMMAR.length ? Object.fromEntries(GRAMMAR.map(s => [s.gid, s])) : {};
    const rows = Object.entries(pr).sort((a, b) => {
      const ta = a[1].got + a[1].missed, tb = b[1].got + b[1].missed;
      if (tb !== ta) return tb - ta;
      return b[1].missed - a[1].missed;
    });
    rows.forEach(([gid, r]) => {
      const tot = r.got + r.missed;
      const mastery = (point[gid] && typeof point[gid].mastery === 'number') ? point[gid].mastery : null;
      const delta = mastery !== null ? calcDelta(mastery, r.got, r.missed) : null;
      const row = document.createElement('div');
      row.className = 'breakdown-row';
      const deltaStr = delta === null ? '' : ' · <span class="bd-delta' + (delta < 0 ? ' neg' : '') + '">' + (delta >= 0 ? '+' : '') + delta + '</span>';
      row.innerHTML = '<span class="bd-name">' + gid + ' · ' + (r.name || '') + '</span><span class="bd-stats">' + r.got + '/' + tot + deltaStr + '</span>';
      bd.appendChild(row);
    });
    bd.style.display = 'flex';
    document.getElementById('grammarSaveSection').style.display = 'block';
  } else {
    const wc = wordCount(deck);
    document.getElementById('doneStats').textContent = deck.length + ' sentences · ' + wc + ' words' + (missedWords.size ? ' · ' + missedWords.size + ' missed' : '');
    if (missedWords.size > 0) {
      document.getElementById('flaggedSection').style.display = 'block';
      const fw = document.getElementById('flaggedWords');
      fw.innerHTML = '';
      missedWords.forEach(w => {
        const el = document.createElement('span');
        el.className = 'flagged-word'; el.textContent = w; fw.appendChild(el);
      });
    }
  }
}

function doRestart(doShuffle) {
  const src = mode === 'daily' ? dailyDeck : mode === 'practice' ? practiceDeck : grammarDeck;
  deck = doShuffle ? shuffle([...src]) : [...src];
  idx = 0; revealed = false; missedWords = new Set();
  if (mode === 'grammar') {
    deckState.grammar = { idx: 0, missed: new Set(), pointResults: {} };
  } else {
    deckState[mode] = { idx: 0, missed: new Set() };
  }
  clearState();
  hideDone();
  resetFlagState();
  resetSaveState();
  document.getElementById('cardWrap').classList.remove('hide');
  document.getElementById('keyHint').style.display = '';
  document.getElementById('actionBtns').classList.remove('show');
  render();
}

function saveGrammarResults() {
  const pr = deckState.grammar.pointResults;
  const results = Object.entries(pr).map(([gid, r]) => ({ gid, got: r.got, missed: r.missed }));
  if (results.length === 0) return;
  const today = new Date().toISOString().slice(0, 10);
  const session = { date: today, results };
  const filePath = '_06 Donkey Work/Temp Donkey Files/grammar-drill-results.jsonl';
  const data = JSON.stringify(session) + '\n';
  const url = 'obsidian://advanced-uri'
    + '?vault=' + encodeURIComponent('Main Brain')
    + '&filepath=' + encodeURIComponent(filePath)
    + '&data=' + encodeURIComponent(data)
    + '&mode=append';
  window.open(url);
  document.getElementById('saveBtn').disabled = true;
  document.getElementById('saveBtn').textContent = 'Saved ✓';
  setTimeout(() => document.getElementById('saveConfirm').classList.add('show'), 300);
}

function flagForTomorrow() {
  const words = [...missedWords];
  const filePath = '_06 Donkey Work/Temp Donkey Files/spanish-flagged-words.md';
  const data = words.join('\n');
  const url = 'obsidian://advanced-uri'
    + '?vault=' + encodeURIComponent('Main Brain')
    + '&filepath=' + encodeURIComponent(filePath)
    + '&data=' + encodeURIComponent(data)
    + '&mode=overwrite';
  window.open(url);
  document.getElementById('flagBtn').disabled = true;
  document.getElementById('flagBtn').textContent = 'Flagged ✓';
  setTimeout(() => document.getElementById('flagConfirm').classList.add('show'), 300);
}

document.addEventListener('click', e => {
  if (e.target.closest('button') || e.target.closest('.tab-bar')) return;
  if (document.getElementById('doneScreen').classList.contains('show')) return;
  if (document.getElementById('emptyState').classList.contains('show')) return;
  if (!revealed) reveal();
});
document.addEventListener('keydown', e => {
  if (document.getElementById('doneScreen').classList.contains('show')) return;
  if (document.getElementById('emptyState').classList.contains('show')) return;
  if (e.code === 'Space') { e.preventDefault(); if (!revealed) reveal(); else handleAction(false); }
  if (e.key === 'm' || e.key === 'M') { if (!revealed) reveal(); else handleAction(true); }
  if (e.key === 'Tab') {
    e.preventDefault();
    // Cycle daily → practice → grammar → daily, skipping empty decks
    const order = ['daily', 'practice', 'grammar'];
    const populated = order.filter(m => (m === 'daily' ? DAILY : m === 'practice' ? PRACTICE : GRAMMAR).length > 0);
    if (populated.length < 2) return;
    const cur = populated.indexOf(mode);
    const next = populated[(cur + 1) % populated.length];
    setMode(next);
  }
});

async function init() {
  const saved = await loadState();
  if (saved) {
    dailyDeck = saved.daily; practiceDeck = saved.practice;
    grammarDeck = saved.grammar || shuffle([...GRAMMAR]);
    if (saved.deckState) {
      deckState.daily.idx = saved.deckState.daily.idx || 0;
      deckState.daily.missed = new Set(saved.deckState.daily.missed || []);
      deckState.practice.idx = saved.deckState.practice.idx || 0;
      deckState.practice.missed = new Set(saved.deckState.practice.missed || []);
      if (saved.deckState.grammar) {
        deckState.grammar.idx = saved.deckState.grammar.idx || 0;
        deckState.grammar.missed = new Set(saved.deckState.grammar.missed || []);
        deckState.grammar.pointResults = saved.deckState.grammar.pointResults || {};
      }
    } else {
      deckState[saved.mode || 'daily'].idx = saved.idx || 0;
      deckState[saved.mode || 'daily'].missed = new Set(saved.missed || []);
    }
    // Bug fix: if saved mode's deck is now empty, fall back to first non-empty deck
    let savedMode = saved.mode || 'daily';
    const decksByMode = { daily: dailyDeck, practice: practiceDeck, grammar: grammarDeck };
    if (decksByMode[savedMode] && decksByMode[savedMode].length === 0) {
      const order = ['daily', 'practice', 'grammar'];
      savedMode = order.find(m => decksByMode[m].length > 0) || 'daily';
    }
    mode = savedMode;
    // Bug fix: if restored idx is past end (deck was completed in prior session), reset to 0
    if (deckState.daily.idx >= dailyDeck.length && dailyDeck.length > 0) deckState.daily.idx = 0;
    if (deckState.practice.idx >= practiceDeck.length && practiceDeck.length > 0) deckState.practice.idx = 0;
    if (deckState.grammar.idx >= grammarDeck.length && grammarDeck.length > 0) deckState.grammar.idx = 0;
    idx = deckState[mode].idx; missedWords = new Set(deckState[mode].missed);
  } else {
    dailyDeck = shuffle([...DAILY]); practiceDeck = shuffle([...PRACTICE]); grammarDeck = shuffle([...GRAMMAR]);
    mode = 'daily'; idx = 0; missedWords = new Set();
    deckState.daily = { idx: 0, missed: new Set() };
    deckState.practice = { idx: 0, missed: new Set() };
    deckState.grammar = { idx: 0, missed: new Set(), pointResults: {} };
  }
  deck = [...(mode === 'daily' ? dailyDeck : mode === 'practice' ? practiceDeck : grammarDeck)];
  document.body.classList.toggle('grammar-mode', mode === 'grammar');
  revealed = false;
}
init().then(() => { updateTabs(); if (deck.length > 0) render(); else showEmpty(); });

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/Spanish-Web-App/sw.js');
  });
}
</script>
